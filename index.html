<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我好愛台彩賓果</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #eee; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .main-layout { display: flex; gap: 20px; width: 100%; max-width: 1100px; flex-wrap: wrap; justify-content: center; }
        .container { background-color: #1e1e1e; border-radius: 12px; padding: 25px; flex: 1; min-width: 350px; max-width: 500px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); height: fit-content; }
        .stats-sidebar { background-color: #1e1e1e; border-radius: 12px; padding: 25px; flex: 0.8; min-width: 320px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); border: 1px solid #e5a93c; height: fit-content; }
        h1, h2 { color: #e5a93c; text-align: center; border-bottom: 2px solid #e5a93c; padding-bottom: 10px; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #aaa; }
        select, input, button { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #444; background-color: #2c2c2c; color: white; font-size: 16px; box-sizing: border-box; }
        button { background-color: #e5a93c; color: #121212; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:hover { background-color: #d49a35; }
        .hidden { display: none; }
        .summary-card { font-size: 18px; font-weight: bold; line-height: 2; color: #4caf50; background: #000; padding: 15px; border-radius: 8px; }
        .summary-card span.lose { color: #ff5252; }
        .log-container { margin-top: 15px; max-height: 400px; overflow-y: auto; background-color: #000; padding: 10px; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 13px; border: 1px solid #333; }
        .log-row { border-bottom: 1px dashed #333; padding: 6px 0; }
        .match-num { color: #111; background-color: #e5a93c; padding: 0 2px; border-radius: 3px; font-weight: bold; }
        .win-text { color: #ffeb3b; font-weight: bold; }
        .lose-text { color: #777; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; color: #fff; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #e5a93c; }
        .roi-positive { color: #4caf50; }
        .roi-negative { color: #ff5252; }
    </style>
</head>
<body onclick="initAudio()">

<div class="main-layout">
    <div class="container">
        <h1>🎰 賓果模擬控制台</h1>
        <div class="form-group">
            <label>選擇玩法：</label>
            <select id="gameType" onchange="updateUI()">
                <option value="star">一般星數玩法 (1-10星)</option>
                <option value="bigsmall">猜大小玩法</option>
            </select>
        </div>
        <div id="starOptionsDiv">
            <div class="form-group">
                <label>星數：</label>
                <select id="starCount" onchange="updateInputHint()">
                    <option value="1">1星</option><option value="2">2星</option><option value="3">3星</option>
                    <option value="4" selected>4星</option><option value="5">5星</option><option value="6">6星</option>
                    <option value="7">7星</option><option value="8">8星</option><option value="9">9星</option><option value="10">10星</option>
                </select>
            </div>
            <div class="form-group">
                <label>選號：</label>
                <select id="pickMode" onchange="updateUI()">
                    <option value="auto">電腦隨機換號</option>
                    <option value="manual">手動固定選號</option>
                </select>
            </div>
            <div id="manualInputDiv" class="form-group hidden">
                <label id="manualHint">輸入 4 個號碼：</label>
                <input type="text" id="manualNumbers" placeholder="例如: 08 16 24 32">
            </div>
        </div>
        <div id="bigSmallDiv" class="form-group hidden">
            <label>預測：</label>
            <select id="guessDir">
                <option value="1">猜大 (41-80)</option>
                <option value="2">猜小 (01-40)</option>
            </select>
        </div>
        <div class="form-group">
            <label>投入本金：</label>
            <input type="number" id="budget" value="1000" step="25">
        </div>
        <button onclick="runSimulation()">發射！啟動模擬</button>
        <div class="log-container" id="logBox">開獎明細將顯示在此...</div>
    </div>

    <div class="stats-sidebar">
        <h2>📊 模擬戰績總表</h2>
        <div class="summary-card" id="statBox">等待數據中...</div>
        <table>
            <thead>
                <tr>
                    <th>項目</th>
                    <th>數值</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>當前模式</td><td id="table-mode">-</td></tr>
                <tr><td>總期數</td><td id="table-rounds">-</td></tr>
                <tr><td>勝率(含保本)</td><td id="table-winrate">-</td></tr>
                <tr><td>淨報酬率 (ROI)</td><td id="table-roi">-</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let bgm = new Audio('bgm.mp3');
    bgm.loop = true;
    let audioStarted = false;

    const payTable = {
        1: { 1: 50 }, 2: { 2: 75 }, 3: { 3: 500, 2: 50 }, 4: { 4: 1000, 3: 100, 2: 25 },
        5: { 5: 2000, 4: 500, 3: 50 }, 6: { 6: 25000, 5: 1000, 4: 200, 3: 25 },
        7: { 7: 100000, 6: 3000, 5: 300, 4: 50, 3: 25, 0: 25 },
        8: { 8: 500000, 7: 20000, 6: 1000, 5: 200, 4: 25, 0: 25 },
        9: { 9: 1000000, 8: 100000, 7: 3000, 6: 500, 5: 100, 4: 25, 0: 25 },
        10: { 10: 5000000, 9: 250000, 8: 25000, 7: 2500, 6: 250, 5: 25, 0: 25 }
    };

    function initAudio() { if (!audioStarted) { bgm.play().catch(()=>{}); audioStarted = true; } }
    function updateUI() {
        const type = document.getElementById('gameType').value;
        const mode = document.getElementById('pickMode').value;
        document.getElementById('starOptionsDiv').classList.toggle('hidden', type !== 'star');
        document.getElementById('bigSmallDiv').classList.toggle('hidden', type !== 'bigsmall');
        document.getElementById('manualInputDiv').classList.toggle('hidden', mode !== 'manual' || type !== 'star');
        updateInputHint();
    }
    function updateInputHint() {
        const star = document.getElementById('starCount').value;
        document.getElementById('manualHint').innerText = `輸入 ${star} 個號碼 (空白隔開)：`;
    }
    function generateNums(n) {
        let s = new Set();
        while(s.size < n) s.add(Math.floor(Math.random()*80)+1);
        return Array.from(s).sort((a,b)=>a-b);
    }

    function runSimulation() {
        const initialBudget = parseInt(document.getElementById('budget').value);
        if (isNaN(initialBudget) || initialBudget < 25) return;
        
        const type = document.getElementById('gameType').value;
        const star = parseInt(document.getElementById('starCount').value);
        const mode = document.getElementById('pickMode').value;
        const rounds = Math.floor(initialBudget / 25);
        
        let balance = initialBudget;
        let wins = 0;
        let logs = "";
        let manualNums = [];

        if (type === 'star' && mode === 'manual') {
            manualNums = document.getElementById('manualNumbers').value.trim().split(/\s+/).map(Number).filter(n => n >= 1 && n <= 80);
            if (manualNums.length !== star) manualNums = generateNums(star);
        }

        for(let i=1; i<=rounds; i++) {
            balance -= 25;
            let draw = generateNums(20);
            let row = `<div class="log-row">[#${i}] `;
            if (type === 'star') {
                let mine = (mode === 'auto') ? generateNums(star) : manualNums;
                let hits = mine.filter(n => draw.includes(n));
                let prize = payTable[star][hits.length] || 0;
                if(prize > 0) { balance += prize; wins++; row += `<span class="win-text">中${hits.length}顆 +${prize}</span>`; }
                else { row += `<span class="lose-text">未中</span>`; }
            } else {
                let big = draw.filter(n => n >= 41).length;
                let won = (document.getElementById('guessDir').value === '1' && big >= 13) || (document.getElementById('guessDir').value === '2' && (20-big) >= 13);
                if(won) { balance += 150; wins++; row += `<span class="win-text">勝 +150</span>`; }
                else { row += `<span class="lose-text">敗</span>`; }
            }
            logs += row + `</div>`;
        }

        const netProfit = balance - initialBudget;
        const roi = ((netProfit / initialBudget) * 100).toFixed(2);
        
        // 更新旁邊的總表
        document.getElementById('table-mode').innerText = type === 'star' ? `${star}星玩法` : '猜大小';
        document.getElementById('table-rounds').innerText = `${rounds} 期`;
        document.getElementById('table-winrate').innerText = `${((wins/rounds)*100).toFixed(2)} %`;
        document.getElementById('table-roi').innerText = `${roi} %`;
        document.getElementById('table-roi').className = netProfit >= 0 ? 'roi-positive' : 'roi-negative';

        document.getElementById('statBox').innerHTML = `
            結算餘額：<span class="${netProfit<0?'lose':''}">${balance} 元</span><br>
            總淨利潤：<span class="${netProfit<0?'lose':''}">${netProfit} 元</span>
        `;
        document.getElementById('logBox').innerHTML = logs;
    }

    window.onload = () => { updateUI(); setTimeout(runSimulation, 300); };
</script>
</body>
</html>
