<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我好愛台彩賓果 - 全能模擬器</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #eee; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: #1e1e1e; border-radius: 12px; padding: 25px; width: 100%; max-width: 650px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
        h1 { color: #e5a93c; text-align: center; border-bottom: 2px solid #e5a93c; padding-bottom: 10px; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #aaa; }
        select, input, button { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; background-color: #2c2c2c; color: white; font-size: 16px; box-sizing: border-box; }
        button { background-color: #e5a93c; color: #121212; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:hover { background-color: #d49a35; }
        .hidden { display: none; }
        .result-panel { margin-top: 20px; background-color: #181818; border-radius: 8px; padding: 15px; border: 1px solid #333; }
        /* 核心報表樣式 */
        .summary { font-size: 18px; font-weight: bold; line-height: 1.8; color: #4caf50; padding: 12px; background: #000; border-radius: 6px; }
        .summary span.lose { color: #ff5252; }
        .log-container { margin-top: 15px; max-height: 350px; overflow-y: auto; background-color: #000; padding: 10px; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 13px; }
        .log-row { border-bottom: 1px dashed #333; padding: 6px 0; }
        .match-num { color: #111; background-color: #e5a93c; padding: 0 2px; border-radius: 3px; font-weight: bold;}
        .win-text { color: #ffeb3b; font-weight: bold; }
        .lose-text { color: #777; }
    </style>
</head>
<body onclick="initAudio()">

<div class="container">
    <h1>🎰 我好愛台彩賓果 (1-10星版) 🎰</h1>
    <p style="text-align: center; color: #e5a93c; font-size: 14px; margin-top: -5px;">(點擊畫面啟動背景音樂 bgm.mp3)</p>

    <div class="form-group">
        <label>選擇玩法：</label>
        <select id="gameType" onchange="updateUI()">
            <option value="star">一般星數玩法 (1-10星)</option>
            <option value="bigsmall">猜大小玩法</option>
        </select>
    </div>

    <div id="starSelectDiv" class="form-group">
        <label>選擇星數：</label>
        <select id="starCount">
            <option value="1">1星</option>
            <option value="2">2星</option>
            <option value="3">3星</option>
            <option value="4" selected>4星</option>
            <option value="5">5星</option>
            <option value="6">6星</option>
            <option value="7">7星</option>
            <option value="8">8星</option>
            <option value="9">9星</option>
            <option value="10">10星</option>
        </select>
    </div>

    <div id="bigSmallDiv" class="form-group hidden">
        <label>預測方向：</label>
        <select id="guessDir">
            <option value="1">猜大 (41-80號)</option>
            <option value="2">猜小 (01-40號)</option>
        </select>
    </div>

    <div class="form-group">
        <label>投入總本金 (25元/注)：</label>
        <input type="number" id="budget" value="1000" step="25">
    </div>

    <button onclick="runSimulation()">開始瘋狂模擬</button>

    <div id="resultArea" class="result-panel">
        <div class="summary" id="statBox">等待數據中...</div>
        <div class="log-container" id="logBox"></div>
    </div>
</div>

<script>
    let bgm = new Audio('bgm.mp3');
    bgm.loop = true;
    let audioStarted = false;

    // 官方 1-10 星賠率表
    const payTable = {
        1: { 1: 50 },
        2: { 2: 75 },
        3: { 3: 500, 2: 50 },
        4: { 4: 1000, 3: 100, 2: 25 },
        5: { 5: 2000, 4: 500, 3: 50 },
        6: { 6: 25000, 5: 1000, 4: 200, 3: 25 },
        7: { 7: 100000, 6: 3000, 5: 300, 4: 50, 3: 25, 0: 25 },
        8: { 8: 500000, 7: 20000, 6: 1000, 5: 200, 4: 25, 0: 25 },
        9: { 9: 1000000, 8: 100000, 7: 3000, 6: 500, 5: 100, 4: 25, 0: 25 },
        10: { 10: 5000000, 9: 250000, 8: 25000, 7: 2500, 6: 250, 5: 25, 0: 25 }
    };

    function initAudio() { if (!audioStarted) { bgm.play().catch(e => console.log("等待點擊播放")); audioStarted = true; } }

    function updateUI() {
        const type = document.getElementById('gameType').value;
        document.getElementById('starSelectDiv').classList.toggle('hidden', type !== 'star');
        document.getElementById('bigSmallDiv').classList.toggle('hidden', type !== 'bigsmall');
    }

    function generateNums(n) {
        let s = new Set();
        while(s.size < n) s.add(Math.floor(Math.random()*80)+1);
        return Array.from(s).sort((a,b)=>a-b);
    }

    function runSimulation() {
        const initialBudget = parseInt(document.getElementById('budget').value);
        if (isNaN(initialBudget) || initialBudget < 25) return;
        
        const type = document.getElementById('gameType').value;
        const star = parseInt(document.getElementById('starCount').value);
        const rounds = Math.floor(initialBudget / 25);
        
        let balance = initialBudget;
        let wins = 0;
        let logs = "";

        for(let i=1; i<=rounds; i++) {
            balance -= 25;
            let draw = generateNums(20);
            let row = `<div class="log-row">[第${i}期] `;

            if (type === 'star') {
                let mine = generateNums(star);
                let hits = mine.filter(n => draw.includes(n));
                let prize = payTable[star][hits.length] || 0;
                
                row += `號碼: ${mine.join(',')} | 中: ${hits.length} | `;
                if(prize > 0) { balance += prize; wins++; row += `<span class="win-text">獎金: ${prize}</span>`; }
                else { row += `<span class="lose-text">槓龜</span>`; }
            } else {
                let big = draw.filter(n => n >= 41).length;
                let dir = document.getElementById('guessDir').value;
                let won = (dir === '1' && big >= 13) || (dir === '2' && (20-big) >= 13);
                row += `大:${big} 小:${20-big} | `;
                if(won) { balance += 150; wins++; row += `<span class="win-text">贏了! +150</span>`; }
                else { row += `<span class="lose-text">輸了</span>`; }
            }
            logs += row + `</div>`;
        }

        const netProfit = balance - initialBudget;
        const profitClass = netProfit >= 0 ? "" : "lose";
        document.getElementById('statBox').innerHTML = `
            💰 結算報告 💰<br>
            投入總本金：${initialBudget} 元<br>
            最終餘額：<span class="${profitClass}">${balance} 元</span><br>
            總淨利潤：<span class="${profitClass}">${netProfit} 元</span><br>
            總勝率(含保本)：${((wins/rounds)*100).toFixed(2)} %
        `;
        document.getElementById('logBox').innerHTML = logs;
    }

    window.onload = () => setTimeout(runSimulation, 300);
</script>
</body>
</html>
