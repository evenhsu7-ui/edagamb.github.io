<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我好愛台彩賓果 - 模擬器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #eeeeee;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 25px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        h1 {
            color: #e5a93c;
            text-align: center;
            border-bottom: 2px solid #e5a93c;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #aaa; }
        select, input, button {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #2c2c2c;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background-color: #e5a93c;
            color: #121212;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }
        button:hover { background-color: #d49a35; }
        .hidden { display: none; }
        .result-panel {
            margin-top: 20px;
            background-color: #181818;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #333;
        }
        .summary { font-size: 18px; font-weight: bold; line-height: 1.6; color: #4caf50; }
        .summary span.lose { color: #ff5252; }
        .log-container {
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
            background-color: #000;
            padding: 10px;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
        }
        .log-row { border-bottom: 1px dashed #333; padding: 4px 0; }
        .match-num { color: #111; background-color: #e5a93c; padding: 0 2px; border-radius: 3px; font-weight: bold;}
        .win-text { color: #ffeb3b; }
        .lose-text { color: #888; }
    </style>
</head>
<body onclick="initAudio()">

<div class="container">
    <h1>🎰 我好愛台彩賓果 🎰</h1>
    <p style="text-align: center; color: #e5a93c; font-size: 14px;">點擊頁面任何地方即可啟動音樂</p>

    <div class="form-group">
        <label>遊戲模式：</label>
        <select id="mainChoice" onchange="toggleOptions()">
            <option value="1">1. 4星玩法</option>
            <option value="2">2. 猜大小玩法</option>
        </select>
    </div>

    <div class="form-group">
        <label>投入總本金 (25的倍數)：</label>
        <input type="number" id="moneyInput" value="5000" step="25">
    </div>

    <div id="star4Options" class="form-group">
        <label>選號方式：</label>
        <select id="pickMode" onchange="toggleManualInput()">
            <option value="2">電腦隨機換號</option>
            <option value="1">手動固定選號</option>
        </select>
        <div id="manualInputDiv" class="hidden" style="margin-top: 10px;">
            <label>輸入 4 個數字 (用空白隔開)：</label>
            <input type="text" id="manualNumbers" placeholder="例如: 05 12 34 78">
        </div>
    </div>

    <div id="bigSmallOptions" class="form-group hidden">
        <label>預測方向：</label>
        <select id="guessDirection">
            <option value="1">猜大 (41~80號)</option>
            <option value="2">猜小 (01~40號)</option>
        </select>
    </div>

    <button onclick="runSimulation()">開始瘋狂模擬</button>

    <div id="resultArea" class="result-panel">
        <div class="summary" id="summaryBox">準備就緒，請點擊按鈕開始。</div>
        <div class="log-container" id="logBox"></div>
    </div>
</div>

<script>
    // 音訊初始化邏輯
    let bgm = new Audio('bgm.mp3');
    bgm.loop = true;
    let audioStarted = false;

    function initAudio() {
        if (!audioStarted) {
            bgm.play().catch(e => console.log("等待點擊播放"));
            audioStarted = true;
        }
    }

    // 網頁載入後自動跑一次模擬
    window.onload = function() {
        setTimeout(runSimulation, 500); 
    };

    function toggleOptions() {
        const choice = document.getElementById('mainChoice').value;
        document.getElementById('star4Options').classList.toggle('hidden', choice !== "1");
        document.getElementById('bigSmallOptions').classList.toggle('hidden', choice !== "2");
    }

    function toggleManualInput() {
        const pickMode = document.getElementById('pickMode').value;
        document.getElementById('manualInputDiv').classList.toggle('hidden', pickMode !== "1");
    }

    function generateNumbers(size) {
        let nums = new Set();
        while (nums.size < size) nums.add(Math.floor(Math.random() * 80) + 1);
        return Array.from(nums).sort((a, b) => a - b);
    }

    function padNum(num) { return num.toString().padStart(2, '0'); }

    function runSimulation() {
        const choice = document.getElementById('mainChoice').value;
        const initialMoney = parseInt(document.getElementById('moneyInput').value);
        if (isNaN(initialMoney) || initialMoney < 25) return;
        
        const totalRounds = Math.floor(initialMoney / 25);
        let currentMoney = initialMoney;
        let winCount = 0;
        let logHTML = "";

        for (let i = 1; i <= totalRounds; i++) {
            currentMoney -= 25;
            let drawNums = generateNumbers(20);
            let roundLog = `<div class="log-row">[期別 ${i}] `;

            if (choice === "1") {
                let playerNums = (document.getElementById('pickMode').value === "2") ? generateNumbers(4) : document.getElementById('manualNumbers').value.trim().split(/\s+/).map(n => parseInt(n)).sort((a,b)=>a-b);
                if (playerNums.length < 4) playerNums = generateNumbers(4);
                
                let match = 0;
                drawNums.forEach(num => {
                    if (playerNums.includes(num)) { roundLog += `<span class="match-num">[${padNum(num)}]</span> `; match++; }
                    else { roundLog += ` ${padNum(num)} `; }
                });
                if (match === 4) currentMoney += 1000;
                else if (match === 3) currentMoney += 100;
                else if (match === 2) currentMoney += 25;
                if (match >= 2) winCount++;
                roundLog += ` | <span class="win-text">${match === 4 ? '全中! +1000' : match === 3 ? '中3 +100' : match === 2 ? '保本' : '槓龜'}</span>`;
            } else {
                let bigCount = 0;
                drawNums.forEach(num => { if (num >= 41) bigCount++; });
                let guess = document.getElementById('guessDirection').value;
                let won = (guess === "1" && bigCount >= 13) || (guess === "2" && (20-bigCount) >= 13);
                if (won) { currentMoney += 150; winCount++; }
                roundLog += `預測${guess==="1"?'大':'小'} | 大:${bigCount} 小:${20-bigCount} | ${won?'<span class="win-text">贏了! +150</span>':'<span class="lose-text">輸了</span>'}`;
            }
            roundLog += `</div>`;
            logHTML += roundLog;
        }

        const netProfit = currentMoney - initialMoney;
        document.getElementById('summaryBox').innerHTML = `模擬結束。最終餘額：${currentMoney} 元 (淨利：${netProfit} 元)`;
        document.getElementById('logBox').innerHTML = logHTML;
    }
</script>
</body>
</html>
